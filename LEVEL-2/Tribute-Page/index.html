<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 400px;
      margin: 50px auto;
      padding: 20px;
      border: 2px solid #ccc;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input, button {
      margin: 5px 0;
      padding: 8px;
      font-size: 16px;
    }

    button {
      cursor: pointer;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 10px;
    }

    li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid #ddd;
      padding: 8px;
      margin: 5px 0;
      border-radius: 5px;
    }

    li span {
      flex-grow: 1;
    }

    .edit-btn {
      background-color: #ffc107;
      border: none;
      padding: 5px 10px;
      margin-right: 5px;
      border-radius: 3px;
    }

    .delete-btn {
      background-color: #dc3545;
      border: none;
      padding: 5px 10px;
      border-radius: 3px;
      color: white;
    }

    .add-btn {
      background-color: #28a745;
      border: none;
      padding: 8px 15px;
      color: white;
      border-radius: 5px;
    }
  </style>
</head>
<body>

  <h2>📝 To-Do List</h2>
  <input type="text" id="taskInput" placeholder="Enter a task">
  <button class="add-btn" onclick="addTask()">Add Task</button>
  <ul id="taskList"></ul>
  <script src="script.js"></script>

</body>
</html>
